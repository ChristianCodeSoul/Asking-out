<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proposal From A Coder?</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Inter',sans-serif;
    background:
    linear-gradient(
        135deg,
        #0b1020,
        #141b34,
        #231942
    );

    min-height:100vh;
    overflow:auto;

    display:flex;
    justify-content:center;
    align-items:center;
}

/* Falling hearts */

.heart{
    position:fixed;
    color:rgba(255,120,180,.12);
    user-select:none;
    pointer-events:none;
    animation:fall linear forwards;
}

@keyframes fall{
    from{
        transform:translateY(-100px);
    }
    to{
        transform:translateY(110vh);
    }
}

/* Main card */

.card{
    width:90%;
    max-width:700px;

    background:rgba(255,255,255,.06);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:28px;

    padding:50px;

    text-align:center;

    box-shadow:
    0 20px 60px rgba(0,0,0,.35);
}

.title{
    font-size:2.3rem;
    font-weight:700;
    color:white;
    margin-bottom:20px;
}

.text{
    color:#cfd8ff;
    font-size:1.15rem;
    line-height:1.8;
    min-height:130px;
}

.btn{
    margin-top:25px;

    border:none;

    background:linear-gradient(
        90deg,
        #ff7bc9,
        #7aa6ff
    );

    color:white;

    padding:14px 34px;

    border-radius:14px;

    font-size:1rem;

    cursor:pointer;

    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
}

.sticker{
    width:280px;
    max-width:100%;
    margin:20px auto;

    display:none;

    animation:pop .5s ease;
}

@keyframes pop{

    from{
        opacity:0;
        transform:scale(.6);
    }

    to{
        opacity:1;
        transform:scale(1);
    }
}

.small{
    margin-top:20px;
    color:#92a3ff;
    font-family:monospace;
    font-size:.95rem;
}

.fade{
    animation:fade .4s ease;
}

@keyframes fade{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

.glow{
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(255,100,200,.15),
        transparent 70%
    );

    top:-200px;
    left:-150px;
}

.glow2{
    position:fixed;
    width:500px;
    height:500px;
    border-radius:50%;

    background:
    radial-gradient(
        circle,
        rgba(100,160,255,.15),
        transparent 70%
    );

    bottom:-200px;
    right:-150px;
}

</style>
</head>
<body>

<div class="glow"></div>
<div class="glow2"></div>

<div class="card">

    <div class="title">
        so u wanted a proposal from a coder?
    </div>

    <div class="text fade" id="text">
        hmm...
        <br><br>
        go on
        <br>
        click me.
    </div>

    <img src="cat.png" id="cat1" class="sticker">
    <img src="cat two.png" id="cat2" class="sticker">

    <button id="btn" class="btn">
        continue
    </button>

    <div class="small" id="code"></div>

</div>

<script>

// falling hearts

function createHeart(){

    const heart=document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML="♥";

    heart.style.left=Math.random()*100+"vw";

    heart.style.fontSize=
    (10+Math.random()*20)+"px";

    heart.style.animationDuration=
    (8+Math.random()*10)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },18000);
}

setInterval(createHeart,400);

// story

let step=0;

const btn=document.getElementById("btn");
const text=document.getElementById("text");

const cat1=document.getElementById("cat1");
const cat2=document.getElementById("cat2");

const code=document.getElementById("code");

btn.addEventListener("click",()=>{

    step++;

    if(step===1){

        cat1.style.display="block";

        text.innerHTML=`
        yeah nah
        <br><br>
        this was the first thing that came to mind
        `;

    }

    else if(step===2){

        cat1.style.display="none";

        text.innerHTML=`
        alright alright
        <br><br>
        maybe that was a little aggressive
        <br><br>
        trust me
        <br>
        click again
        `;

    }

    else if(step===3){

        cat2.style.display="block";

        text.innerHTML=`
        there u go
        <br><br>
        a hug from a coder
        <br><br>
        now get lost
        `;

        btn.innerText="the end";

        code.innerText=
        "return friendship;";
    }

    else{

        text.innerHTML=`
        session ended successfully.
        `;

        btn.style.display="none";
    }

});

</script>

</body>
</html>
